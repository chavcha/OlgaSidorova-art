<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Картина - Olga Sidorova Art</title>
    <link
      rel="icon"
      type="image/png"
      href="icons/free-icon-art-and-design-6811280.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="product.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <a href="./#home" class="logo-link" aria-label="На главную"
              ><h1>Olga Sidorova Art</h1></a
            >
          </div>
          <nav class="nav">
            <ul class="nav-list">
              <li><a href="./#home" class="nav-link">Главная</a></li>
              <li><a href="./#shop" class="nav-link">Магазин</a></li>
              <li><a href="./#about" class="nav-link">Обо мне</a></li>
              <li>
                <a href="./#contacts" class="nav-link">Контакты</a>
              </li>
            </ul>
          </nav>
          <button class="mobile-menu-toggle" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </header>

    <main class="product-main">
      <div class="container">
        <a href="./#shop" class="back-link">← Назад к каталогу</a>

        <div class="product-navigation">
          <button
            class="nav-arrow nav-arrow-left"
            id="prevProduct"
            aria-label="Предыдущий товар"
          >
            <span>‹</span>
          </button>

          <div id="productContainer" class="product-container">
            <!-- Product content will be loaded here -->
            <div class="loading">Загрузка...</div>
          </div>

          <button
            class="nav-arrow nav-arrow-right"
            id="nextProduct"
            aria-label="Следующий товар"
          >
            <span>›</span>
          </button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2026 Olga Sidorova Art. Все права защищены.</p>
      </div>
    </footer>

    <!-- Modal for image viewing -->
    <div class="modal" id="imageModal">
      <span class="modal-close">&times;</span>
      <button
        type="button"
        class="modal-arrow modal-arrow-left"
        id="modalPrev"
        aria-label="Предыдущее фото"
      >
        <span>‹</span>
      </button>
      <div class="modal-image-container">
        <img class="modal-content" id="modalImage" alt="" />
      </div>
      <button
        type="button"
        class="modal-arrow modal-arrow-right"
        id="modalNext"
        aria-label="Следующее фото"
      >
        <span>›</span>
      </button>
      <div class="modal-caption" id="modalCaption"></div>
    </div>

    <!-- Modal: choose contact method when buying -->
    <div class="buy-modal" id="buyModal">
      <div class="buy-modal-backdrop"></div>
      <div class="buy-modal-card">
        <button type="button" class="buy-modal-close" aria-label="Закрыть">
          &times;
        </button>
        <h2 class="buy-modal-title" id="buyModalTitle">Вы хотите купить?</h2>
        <p class="buy-modal-subtitle">Выберите способ связи с продавцом:</p>
        <div class="buy-modal-options">
          <a
            href="./#contacts"
            class="buy-modal-option buy-modal-option-contacts"
            >Контакты на сайте</a
          >
          <a href="tel:+79184618223" class="buy-modal-option">Телефон</a>
          <a href="mailto:OlgaSidorovaArt@mail.ru" class="buy-modal-option"
            >Email</a
          >
          <a
            href="https://vk.com/o.sidorova1979"
            target="_blank"
            rel="noopener"
            class="buy-modal-option"
            >VK</a
          >
          <a
            href="https://t.me/OlgaSidanapa"
            target="_blank"
            rel="noopener"
            class="buy-modal-option"
            >Telegram</a
          >
          <a
            href="https://wa.me/79184618223"
            target="_blank"
            rel="noopener"
            class="buy-modal-option"
            >WhatsApp</a
          >
        </div>
      </div>
    </div>

    <!-- Scroll to top button -->
    <button class="scroll-to-top" id="scrollToTop" aria-label="Наверх">
      <span>↑</span>
    </button>

    <script src="product.js"></script>
  </body>
</html>
